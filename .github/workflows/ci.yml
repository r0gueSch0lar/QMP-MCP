name: CI

# Mirrors the old GitLab pipeline: a TypeScript gate (lint → typecheck → test →
# build) and a Rust gate (fmt → clippy → test), both scoped so a change to one
# variant doesn't run the other's jobs on a PR (pushes to main and tags run
# everything). Both Docker images are built to validate them. On a version tag,
# the release jobs build the Linux binary and publish to npm — but only after the
# gates pass. GitHub's native auto-merge replaces the old auto-merge job.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # Detect which variant changed, so a TS-only or rust-only PR skips the other lane.
  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ts:
              - 'typescript/**'
              - 'testdata/**'
              - '.env.example'
              - 'policy.example.yaml'
              - '.github/workflows/**'
            rust:
              - 'rust/**'
              - 'testdata/**'
              - '.github/workflows/**'

  # TypeScript gate — one ordered job (a failing step short-circuits the rest).
  typescript:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: typescript/dist
          retention-days: 7

  # Rust gate. The real-qemu / qemu-img integration tests skip themselves when
  # those binaries are absent, so `cargo test` is green on the qemu-less runner.
  rust:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  # Validate the production images build (native Docker — no dind needed).
  docker-typescript:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./typescript
          file: ./typescript/Dockerfile
          push: false
          tags: qmp-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-rust:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./rust
          file: ./rust/Dockerfile
          push: false
          tags: qmp-mcp:rust-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release (version tags only, and only after both gates pass) ──────────────

  # Build the stripped x86-64 Linux binary and attach it to the GitHub Release.
  release-binary:
    needs: [typescript, rust]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build release binary
        working-directory: rust
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-gnu
          install -Dm755 target/x86_64-unknown-linux-gnu/release/qmp-mcp \
            "$GITHUB_WORKSPACE/dist/qmp-mcp-x86_64-unknown-linux-gnu"
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/qmp-mcp-x86_64-unknown-linux-gnu

  # Publish the TypeScript package to npm — only if an NPM_TOKEN secret is set.
  npm-publish:
    needs: [typescript, rust]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish (skips when NPM_TOKEN is unset)
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish."
            exit 0
          fi
          npm ci
          npm publish
