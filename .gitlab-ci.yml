default:
  image: node:20

# Ordered gate: a failure short-circuits the rest, and the build artifact is only
# produced from a tree that passed lint, typecheck, and tests. The final
# auto-merge stage merges the MR once everything above it is green.
stages:
  - lint
  - typecheck
  - test
  - build
  - auto-merge

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# Run merge-request pipelines (so auto-merge can react to them) and branch
# pipelines, without producing a duplicate pipeline for a branch that has an
# open MR.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

.node:
  before_script:
    - npm ci

lint:
  stage: lint
  extends: .node
  script:
    - npm run lint

typecheck:
  stage: typecheck
  extends: .node
  script:
    - npm run typecheck

test:
  stage: test
  extends: .node
  script:
    - npm run test

build:
  stage: build
  extends: .node
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Auto-merge the merge request once this pipeline (lint -> typecheck -> test ->
# build) has passed. This job runs only on merge-request pipelines and only when
# an AUTO_MERGE_TOKEN CI/CD variable is set (a project access token with `api`
# scope and the Maintainer role). Without that token the job is skipped and
# nothing auto-merges.
#
# It sets "merge when pipeline succeeds": because this job sits in the final
# stage, all earlier stages have already passed, so the MR merges as soon as the
# pipeline finishes green.
#
# To restrict auto-merge to explicitly opted-in MRs, append
#   && $CI_MERGE_REQUEST_LABELS =~ /(^|,)auto-merge(,|$)/
# to the rule below and add the `auto-merge` label to the MR.
auto-merge:
  stage: auto-merge
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $AUTO_MERGE_TOKEN'
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl --fail --silent --show-error --request PUT \
        --header "PRIVATE-TOKEN: ${AUTO_MERGE_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/merge?merge_when_pipeline_succeeds=true"
